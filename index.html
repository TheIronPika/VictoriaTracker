<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Victoria Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // EMAILJS INIT
        emailjs.init("NBsqPD18bw0R4XtcM");

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyB9ztBUJyUvlyycujmDjbTcKT-GIejpsM4",
            authDomain: "victoria-tracker-1d2ab.firebaseapp.com",
            projectId: "victoria-tracker-1d2ab",
            storageBucket: "victoria-tracker-1d2ab.firebasestorage.app",
            messagingSenderId: "893813838454",
            appId: "1:893813838454:web:72ac9f21756d00f8a88557"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // STATE
        let habits = [];
        let viewingDate = new Date();
        let collapsed = {};
        let activeFilter = null;

        // tracks which card should play the arrive animation
        let lastActedId = null;

        const getDayIdx = (d) => {
            let day = d.getDay(); 
            return (day === 0) ? 6 : day - 1; 
        };

        // SYNC
        async function syncToFirebase() {
            await setDoc(doc(db, "system", "habits_list"), { data: habits });
        }

        // WEEKLY REPORT
        window.runWeeklyReport = async (isManual = true) => {
            let totalMoney = 0;
            let summaryParts = [];

            habits.forEach(h => {
                const cur = h.history[6];
                const tier = getTier(h, cur);
                let payout = 0;
                if(tier === 'punish') payout = h.valPunish;
                else if(tier === 'low') payout = h.valLow;
                else if(tier === 'goal') payout = h.valGoal;
                else if(tier === 'bonus') payout = h.valBonus;
                
                totalMoney += payout;
                summaryParts.push(`${h.icon} ${h.name}: ${tier.toUpperCase()} ($${payout.toFixed(2)})`);
            });

            const templateParams = {
                date_range: new Date().toLocaleDateString(),
                total_money: `$${totalMoney.toFixed(2)}`,
                summary_text: summaryParts.join('\n')
            };

            try {
                await emailjs.send("service_gj1f9sj", "template_2cyqti5", templateParams);
                habits = habits.map(h => ({
                    ...h,
                    history: [0, 0, 0, 0, 0, 0, 0]
                }));
                await syncToFirebase();
                if(isManual) alert("Weekly report sent and habits reset!");
            } catch (error) {
                console.error("FAILED...", error);
                if(isManual) alert("Email failed to send.");
            }
        };

        // HABIT ACTIONS
        window.addTask = async () => {
            const name = document.getElementById('newName').value;
            const cat = document.getElementById('newCat').value;
            const icon = document.getElementById('newIcon').value || "✨";
            if(!name || !cat) return alert("Please enter name and category");

            const newH = {
                id: Date.now().toString(),
                name,
                icon,
                cat,
                punish: 1,
                low: 3,
                goal: 5,
                bonus: 7,
                max: 7,
                valPunish: -1.50,
                valLow: 1.00,
                valGoal: 2.00,
                valBonus: 3.00,
                history: [0, 0, 0, 0, 0, 0, 0]
            };

            habits.push(newH);
            await syncToFirebase();
            document.getElementById('newName').value = '';
        };

        window.deleteTask = async (id) => {
            if (confirm("Are you sure you want to delete this habit?")) {
                habits = habits.filter(h => h.id !== id);
                await syncToFirebase();
            }
        };

        window.updateField = async (id, field, value) => {
            const h = habits.find(x => x.id === id);
            if(field.startsWith('val')) h[field] = parseFloat(value);
            else h[field] = parseInt(value);
            await syncToFirebase();
        };

        window.toggleBubble = async (id, val) => {
            const h = habits.find(x => x.id === id);
            const dIdx = getDayIdx(viewingDate);
            const oldQty = h.history[dIdx];
            
            let newVal = (oldQty === val) ? val - 1 : val;

            const oldTier = getTier(h, oldQty);
            const newTier = getTier(h, newVal);

            const willMove = (oldQty === 0 && newVal > 0) || (newVal === 0 && oldQty > 0);

            if (willMove) {
                const cardEl = document.querySelector(`.habit-card[data-habit-id="${id}"]`);
                if (cardEl) {
                    cardEl.classList.add('card-leaving');
                    await new Promise(r => setTimeout(r, 260));
                }
            }

            lastActedId = willMove ? id : null;

            for (let i = dIdx; i < 7; i++) {
                h.history[i] = newVal;
            }

            await syncToFirebase();

            if (newVal > oldQty && newTier !== 'punish' && newTier !== oldTier) {
                triggerFanfare(newTier);
            }
        };

        // LISTENERS
        onSnapshot(doc(db, "system", "habits_list"), (doc) => {
            if (doc.exists()) {
                habits = doc.data().data;
                render();
            }
        });

        // UTILS
        function getTier(h, count) {
            if (count >= (h.bonus || 7)) return 'bonus';
            if (count >= (h.goal || 5)) return 'goal';
            if (count >= (h.low || 3)) return 'low';
            return 'punish'; 
        }

        window.render = function() {
            buildDateStrip();
            updateFiltersUI();

            const todayRoot = document.getElementById('todayRoot');
            const priorityRoot = document.getElementById('priorityRoot');
            const weeklyRoot = document.getElementById('weeklyRoot');
            const manageRoot = document.getElementById('manageRoot');
            
            const dIdx = getDayIdx(viewingDate);

            todayRoot.innerHTML = '';
            priorityRoot.innerHTML = '';
            weeklyRoot.innerHTML = '';
            manageRoot.innerHTML = '';

            let totalMoney = 0;
            let counts = { punish: 0, low: 0, goal: 0, bonus: 0 };

            const categories = [...new Set(habits.map(h => h.cat))];

            categories.forEach(cat => {
                const isCol = collapsed[cat];
                let items = habits.filter(h => h.cat === cat);

                items.sort((a, b) => {
                    const aVal = a.history[dIdx];
                    const bVal = b.history[dIdx];
                    
                    const aHasProgress = aVal > 0;
                    const bHasProgress = bVal > 0;

                    if (aHasProgress && !bHasProgress) return 1;
                    if (!aHasProgress && bHasProgress) return -1;
                    return 0;
                });

                let miniDotsHtml = items.map(h => {
                    const t = getTier(h, h.history[dIdx]);
                    return `<div class="mini-dot" style="background:var(--grad-${t})"></div>`;
                }).join('');

                todayRoot.innerHTML += `
                    <div class="category-header" onclick="window.toggleCol('${cat}')">
                        <div style="flex:1">
                            <span class="cat-label">${cat}</span>
                            <div class="status-mini-bar">${miniDotsHtml}</div>
                        </div>
                        <span style="color:var(--header-pink); font-size:12px; font-weight:bold;">${isCol ? 'SHOW ✦' : 'HIDE ✧'}</span>
                    </div>
                `;

                let weekSectionHtml = `
                    <div class="weekly-cat-section">
                        <h3 class="weekly-cat-label" style="font-family:'Playfair Display'; font-size:14px; margin: 20px 0 10px 5px; color:var(--header-pink); text-transform:uppercase; letter-spacing:1px;">${cat}</h3>
                        <div class="weekly-grid">
                            <div class="weekly-row day-labels">
                                <span class="weekly-task-name"></span>
                                <div class="weekly-dots-row">
                                    <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
                                </div>
                            </div>
                `;

                items.forEach(h => {
                    const cur = h.history[dIdx];
                    const tier = getTier(h, cur);
                    counts[tier]++;

                    let payout = 0;
                    if(tier === 'punish') payout = h.valPunish;
                    else if(tier === 'low') payout = h.valLow;
                    else if(tier === 'goal') payout = h.valGoal;
                    else if(tier === 'bonus') payout = h.valBonus;
                    totalMoney += payout;

                    const daysRemainingInWeek = 7 - dIdx;
                    const isUrgent = (h.goal - cur) >= daysRemainingInWeek && (h.goal - cur) > 0;

                    const isArriving = h.id === lastActedId;

                    let bubblesHtml = '';
                    for (let i = 1; i <= (h.max || 7); i++) {
                        const stepTier = getTier(h, i);
                        const isFilled = i <= cur;
                        bubblesHtml += `
                            <div class="bubble ${isFilled ? 'filled ' + stepTier : ''}" 
                                 style="border-color:var(--color-${stepTier})" 
                                 onclick="window.toggleBubble('${h.id}',${i})">
                            </div>`;
                    }

                    const cardHtml = `
                        <div class="habit-card ${isUrgent ? 'priority-border' : ''} ${isArriving ? 'card-arriving' : ''}"
                             data-habit-id="${h.id}">
                            <div style="font-size:24px; margin-right:15px;">${h.icon}</div>
                            <div style="flex:1">
                                ${isUrgent ? '<span class="priority-tag">✦ Goal at Risk</span>' : ''}
                                <p style="margin:0; font-weight:600;">${h.name}</p>
                                <div class="bubbles">${bubblesHtml}</div>
                            </div>
                        </div>
                    `;

                    if (!isCol) {
                        if (!activeFilter || activeFilter === tier) {
                            todayRoot.innerHTML += cardHtml;
                        }
                    }

                    if (isUrgent) {
                        priorityRoot.innerHTML += cardHtml;
                    }

                    const weeklyDotsHtml = h.history.map((c, i) => {
                        const isActionDay = (i === 0 && c > 0) || (i > 0 && c !== h.history[i-1]);
                        const dayTier = getTier(h, c);
                        return isActionDay && c > 0 
                            ? `<div class="weekly-dot" style="background:var(--grad-${dayTier})"></div>` 
                            : `<div class="weekly-dot" style="background:#eee"></div>`;
                    }).join('');

                    weekSectionHtml += `
                        <div class="weekly-row">
                            <span class="weekly-task-name">${h.name}</span>
                            <div class="weekly-dots-row">${weeklyDotsHtml}</div>
                        </div>
                    `;

                    manageRoot.innerHTML += `
                        <div class="manage-card">
                            <h4 class="beloved-small" style="font-family:'Great Vibes'; font-size:24px; color:var(--header-pink); margin:0 0 10px 0;">${h.icon} ${h.name}</h4>
                            <div style="margin-bottom:10px; font-size:12px;">Max Circles: <input type="number" value="${h.max || 7}" style="width:45px;" onchange="window.updateField('${h.id}','max',this.value)"></div>
                            <table class="matrix-table">
                                <tr><th>Tier</th><th>Qty</th><th>$ Payout</th></tr>
                                <tr><td style="color:var(--color-punish)">Debt</td><td><input type="number" value="${h.punish}" onchange="window.updateField('${h.id}','punish',this.value)"></td><td><input type="number" value="${h.valPunish}" onchange="window.updateField('${h.id}','valPunish',this.value)"></td></tr>
                                <tr><td style="color:var(--color-low)">Low</td><td><input type="number" value="${h.low}" onchange="window.updateField('${h.id}','low',this.value)"></td><td><input type="number" value="${h.valLow}" onchange="window.updateField('${h.id}','valLow',this.value)"></td></tr>
                                <tr><td style="color:var(--color-goal)">Goal</td><td><input type="number" value="${h.goal}" onchange="window.updateField('${h.id}','goal',this.value)"></td><td><input type="number" value="${h.valGoal}" onchange="window.updateField('${h.id}','valGoal',this.value)"></td></tr>
                                <tr><td style="color:var(--color-bonus)">Bonus</td><td><input type="number" value="${h.bonus}" onchange="window.updateField('${h.id}','bonus',this.value)"></td><td><input type="number" value="${h.valBonus}" onchange="window.updateField('${h.id}','valBonus',this.value)"></td></tr>
                            </table>
                            <button class="btn-delete" onclick="window.deleteTask('${h.id}')">DELETE TASK</button>
                        </div>
                    `;
                });

                weekSectionHtml += `</div></div>`;
                weeklyRoot.innerHTML += weekSectionHtml;
            });

            lastActedId = null;

            const moneyDisplay = document.getElementById('moneyDisplay');
            moneyDisplay.innerText = (totalMoney < 0 ? '-$' : '$') + Math.abs(totalMoney).toFixed(2);
            moneyDisplay.style.color = totalMoney < 0 ? 'var(--color-punish)' : 'var(--text-main)';

            document.getElementById('countPunish').innerText = counts.punish;
            document.getElementById('countLow').innerText = counts.low;
            document.getElementById('countGoal').innerText = counts.goal;
            document.getElementById('countBonus').innerText = counts.bonus;
        }

        window.toggleCol = (cat) => {
            collapsed[cat] = !collapsed[cat];
            render();
        };

        window.toggleFilter = (tier) => {
            activeFilter = (activeFilter === tier) ? null : tier;
            render();
        };

        window.switchTab = (idx) => {
            const tabs = document.querySelectorAll('.tab');
            const views = document.querySelectorAll('.view');
            tabs.forEach((t, i) => t.classList.toggle('active', i === idx));
            views.forEach((v, i) => v.classList.toggle('active', i === idx));
            render();
        };

        window.handleManageClick = () => {
            const pw = prompt("Enter passcode:");
            if (pw === "1234") {
                window.switchTab(3);
            }
        };

        function updateFiltersUI() {
            const tiers = ['punish', 'low', 'goal', 'bonus'];
            tiers.forEach(t => {
                const el = document.getElementById('filter-' + t);
                if (activeFilter === t) el.classList.add('active-filter');
                else el.classList.remove('active-filter');
            });
        }

        function buildDateStrip() {
            const strip = document.getElementById('dateStrip');
            strip.innerHTML = '';
            const startOfWeek = new Date();
            startOfWeek.setDate(startOfWeek.getDate() - getDayIdx(startOfWeek));

            for (let i = 0; i < 7; i++) {
                const d = new Date(startOfWeek);
                d.setDate(startOfWeek.getDate() + i);
                const isActive = d.toDateString() === viewingDate.toDateString();
                
                strip.innerHTML += `
                    <div class="date-item ${isActive ? 'active' : ''}" onclick="window.setDate('${d.toISOString()}')">
                        <div class="day-label">${d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase()}</div>
                        <div class="day-num">${d.getDate()}</div>
                    </div>
                `;
            }
        }

        window.setDate = (iso) => {
            viewingDate = new Date(iso);
            render();
        };

        function triggerFanfare(tier) {
            if (tier === 'low') {
                confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } });
            } else if (tier === 'goal') {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.7 } });
            } else if (tier === 'bonus') {
                const duration = 3 * 1000;
                const end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }
        }

        window.addEventListener('load', () => {
            updateGreeting();
            fetchWeatherAndUV();
        });

        function updateGreeting() {
            const hour = new Date().getHours();
            let greeting = "Good Morning";
            if (hour >= 12 && hour < 17) greeting = "Good Afternoon";
            else if (hour >= 17 && hour < 21) greeting = "Good Evening";
            else if (hour >= 21 || hour < 5) greeting = "Good Night";
            document.getElementById('daytimeGreeting').innerText = greeting;
        }

        async function fetchWeatherAndUV() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        const weatherRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=imperial&appid=ff4155f6320e193fc795a67d1b40b6dd`);
                        const wData = await weatherRes.json();
                        if (wData.main) {
                            const iconMap = {
                                '01d': '☀️', '01n': '🌙', '02d': '⛅', '02n': '☁️',
                                '03d': '☁️', '03n': '☁️', '04d': '☁️', '04n': '☁️',
                                '09d': '🌧️', '09n': '🌧️', '10d': '🌦️', '10n': '🌧️',
                                '11d': '⛈️', '11n': '⛈️', '13d': '❄️', '13n': '❄️', '50d': '🌫️'
                            };
                            const icon = iconMap[wData.weather[0].icon] || '☀️';
                            document.getElementById('weatherInfo').innerText = `${icon} ${Math.round(wData.main.temp)}°F`;
                        }
                    } catch (e) {}

                    try {
                        const uvRes = await fetch(`https://api.openuv.io/api/v1/uv?lat=${lat}&lng=${lon}`, {
                            headers: { "x-access-token": "openuv-q3onrmo2zfflc-io" }
                        });
                        const uvData = await uvRes.json();
                        const uvIdx = Math.round(uvData.result.uv);
                        const uvEl = document.getElementById('uvDisplay');
                        uvEl.innerText = `UV Index: ${uvIdx}`;
                        if (uvIdx <= 2) uvEl.style.color = "#27ae60";
                        else if (uvIdx <= 5) uvEl.style.color = "#f1c40f";
                        else if (uvIdx <= 7) uvEl.style.color = "#e67e22";
                        else uvEl.style.color = "#d9534f";
                    } catch (e) {
                        document.getElementById('uvDisplay').innerText = "UV Index: --";
                    }
                });
            }
        }
    </script>

    <style>
        :root {
            --bg-color: #f8f6f2;
            --header-pink: #d4a3a3;
            --soft-rose: #f9ecec;
            --text-main: #4a3a3a;
            --color-punish: #d9534f;
            --color-low: #e67e22;
            --color-goal: #27ae60;
            --color-bonus: #8e44ad;
            --grad-punish: linear-gradient(135deg, #ff9a9e 0%, #d9534f 100%);
            --grad-low: linear-gradient(135deg, #f6d365 0%, #e67e22 100%);
            --grad-goal: linear-gradient(135deg, #84fab0 0%, #27ae60 100%);
            --grad-bonus: linear-gradient(135deg, #d4a0fc 0%, #8e44ad 100%);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: url("background.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        .phone-mockup {
            width: 100%;
            max-width: 480px;
            margin: auto;
            min-height: 100vh;
            padding: 25px;
            box-sizing: border-box;
            position: relative;
        }

        header { margin-bottom: 30px; }
        .greeting-line { font-family: 'Montserrat'; font-size: 24px; margin-bottom: 20px; text-shadow: 0 1px 2px white; }
        .beloved { font-family: 'Great Vibes', cursive; font-size: 38px; color: var(--header-pink); margin-left: 5px; }

        .date-strip { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .date-item { text-align: center; cursor: pointer; padding: 10px 5px; min-width: 45px; transition: all 0.3s ease; color: #666; }
        .date-item.active { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); color: var(--header-pink); }
        .day-label { font-size: 10px; font-weight: 600; margin-bottom: 5px; }
        .day-num { font-size: 16px; font-weight: 700; }

        .header-status-row { display: flex; gap: 12px; margin-bottom: 25px; }
        .earnings-mini-card {
            flex: 2;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px 5px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .earnings-label { font-size: 10px; font-weight: 700; color: var(--header-pink); text-transform: uppercase; letter-spacing: 2px; }
        .earnings-value-small { font-family: 'Great Vibes', cursive; font-size: 38px; color: var(--header-pink); line-height: 1; margin-top: 5px; }

        .weather-mini-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px 5px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .tier-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .tier-card {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .tier-card.active-filter { background: white; border: 1.5px solid var(--header-pink); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tier-card .tier-title { font-family: 'Great Vibes'; font-size: 22px; margin-bottom: 2px; }
        .tier-card .tier-count { font-weight: 700; font-size: 14px; }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.45);
            padding: 12px 10px;
            border-radius: 50px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .tab {
            font-family: 'Playfair Display', serif;
            color: #555;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.2s ease;
            padding: 2px 8px;
        }
        .tab.active { color: var(--header-pink); }

        .view { display: none; padding-bottom: 100px; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .category-header {
            display: flex;
            padding: 15px 10px;
            margin-bottom: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            align-items: center;
        }
        .cat-label { font-family: 'Playfair Display'; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; }
        .status-mini-bar { display: flex; gap: 4px; margin-top: 6px; }
        .mini-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            user-select: none;
        }
        .mini-dot:hover  { transform: scale(1.1); }
        .mini-dot:active { transform: scale(0.85); }

        .habit-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px 5px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            box-shadow: 5px 5px 15px rgba(212,163,163,0.08);
            position: relative;
        }
        .priority-border { border: 1.5px solid #d4af37; box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .priority-tag { position: absolute; top: 10px; right: 15px; font-size: 9px; color: #b8860b; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .bubbles { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .bubble {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2.5px solid;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bubble.filled.punish { background: var(--grad-punish); border-color: var(--color-punish); }
        .bubble.filled.low    { background: var(--grad-low);    border-color: var(--color-low); }
        .bubble.filled.goal   { background: var(--grad-goal);   border-color: var(--color-goal); }
        .bubble.filled.bonus  { background: var(--grad-bonus);  border-color: var(--color-bonus); }

        @keyframes cardLeave {
            0%   { opacity: 1; transform: translateY(0) scale(1); }
            50%  { opacity: 0.6; transform: translateY(10px) scale(0.97); }
            100% { opacity: 0; transform: translateY(18px) scale(0.96); }
        }
        @keyframes cardArrive {
            0%   { opacity: 0; transform: translateY(-18px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-leaving {
            animation: cardLeave 0.28s cubic-bezier(0.4, 0, 0.6, 1) forwards;
            pointer-events: none;
        }
        .card-arriving {
            animation: cardArrive 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .weekly-grid { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(5px); border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .weekly-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(242,242,242,0.5); }
        .day-labels span { font-size: 9px; font-weight: 800; color: #aaa; width: 14%; text-align: center; }
        .weekly-task-name { font-size: 12px; font-weight: 600; width: 35%; color: var(--text-main); }
        .weekly-dots-row { display: flex; justify-content: space-between; flex: 1; }
        .weekly-dot { width: 11px; height: 11px; border-radius: 50%; }

        .manage-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--header-pink);
        }
        .matrix-table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        .matrix-table th { font-size: 10px; color: #888; text-transform: uppercase; text-align: left; padding-bottom: 5px; }
        .matrix-table td { padding: 5px 0; }
        .matrix-table input { width: 50px; border: 1px solid #eee; padding: 4px; border-radius: 4px; font-family: 'Montserrat'; font-size: 12px; }
        .btn-delete { background: none; border: 1px solid #ffcfcf; color: #d9534f; padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        footer { text-align: center; margin-top: 40px; font-family: 'Great Vibes'; color: var(--header-pink); font-size: 24px; padding-bottom: 40px; }
    </style>
</head>
<body>

<div class="phone-mockup">
    <header>
        <div class="greeting-line"><span id="daytimeGreeting">Good Morning</span>,<span class="beloved">Victoria</span></div>
        <div class="date-strip" id="dateStrip"></div>
    </header>

    <div class="header-status-row">
        <div class="earnings-mini-card">
            <span class="earnings-label">This Week's Balance</span>
            <span class="earnings-value-small" id="moneyDisplay">$0.00</span>
        </div>
        <div class="weather-mini-card">
            <div id="weatherInfo">--°F</div>
            <div id="uvDisplay" style="font-size:11px; margin-top:6px; color:#666; font-weight:normal;">UV Index: --</div>
        </div>
    </div>

    <div class="tier-cards">
        <div class="tier-card" id="filter-punish" style="color:var(--color-punish)" onclick="window.toggleFilter('punish')">
            <div class="tier-title">Debt</div>
            <div class="tier-count" id="countPunish">0</div>
        </div>
        <div class="tier-card" id="filter-low" style="color:var(--color-low)" onclick="window.toggleFilter('low')">
            <div class="tier-title">Low</div>
            <div class="tier-count" id="countLow">0</div>
        </div>
        <div class="tier-card" id="filter-goal" style="color:var(--color-goal)" onclick="window.toggleFilter('goal')">
            <div class="tier-title">Goal</div>
            <div class="tier-count" id="countGoal">0</div>
        </div>
        <div class="tier-card" id="filter-bonus" style="color:var(--color-bonus)" onclick="window.toggleFilter('bonus')">
            <div class="tier-title">Bonus</div>
            <div class="tier-count" id="countBonus">0</div>
        </div>
    </div>

    <nav class="tabs">
        <div class="tab active" onclick="window.switchTab(0)">Today</div>
        <div class="tab" onclick="window.switchTab(1)">Priorities</div>
        <div class="tab" onclick="window.switchTab(2)">Weekly</div>
        <div class="tab" onclick="window.handleManageClick()">Manage 🔒</div>
    </nav>

    <div id="view-today" class="view active">
        <div id="todayRoot"></div>
    </div>

    <div id="view-priority" class="view">
        <div id="priorityRoot"></div>
    </div>

    <div id="view-weekly" class="view">
        <div id="weeklyRoot"></div>
    </div>

    <div id="view-manage" class="view">
        <div class="manage-card">
            <h4 class="beloved-small" style="font-family:'Great Vibes'; font-size:28px; color:var(--header-pink); margin:0 0 15px 0;">Add New Habit</h4>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" id="newIcon" placeholder="Icon (e.g. 🧘)" style="width:20%; padding:10px; border:1px solid #eee; border-radius:8px;">
                <input type="text" id="newName" placeholder="Habit Name" style="flex:1; padding:10px; border:1px solid #eee; border-radius:8px;">
            </div>
            <input type="text" id="newCat" placeholder="Category" style="width:100%; padding:10px; border:1px solid #eee; border-radius:8px; box-sizing:border-box; margin-bottom:10px;">
            <button onclick="window.addTask()" style="width:100%; background:var(--header-pink); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">Create Habit</button>
        </div>

        <button onclick="window.runWeeklyReport(true)" style="width:100%; padding:15px; background:#4a3a3a; color:white; border-radius:12px; margin-bottom:20px; border:none; font-weight:bold; cursor:pointer; font-family:'Playfair Display'; letter-spacing:1px;">SUBMIT WEEKLY REPORT & RESET</button>
        
        <div id="manageRoot"></div>
    </div>

    <footer>Victoria Tracker</footer>
</div>

</body>
</html>
